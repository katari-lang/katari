# Package the VS Code extension per platform — each VSIX bundling the matching katari-lsp binary — and
# attach them to the tag's GitHub Release. Runs after release-katari has built and uploaded the
# `katari-lsp-<version>-<platform>.tar.gz` server tarballs (same workflow_run trigger as release-npm),
# so the extension ships a ready-to-run language server instead of relying on the user's PATH.
# (Marketplace publishing is out of scope for now; users install the matching VSIX from the release
# page.)

name: release-vsix

on:
  workflow_run:
    workflows: [release-katari]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (vX.Y.Z[-prerelease])"
        required: true

permissions:
  contents: write

jobs:
  verify-versions:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-22.04
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.event.workflow_run.head_branch }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "release-vsix: '$TAG' is not a vX.Y.Z[-prerelease] tag" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
      - name: Verify the tree matches the tag
        run: node scripts/verify-versions.mjs --tag "${{ steps.tag.outputs.tag }}"
    outputs:
      tag: ${{ steps.tag.outputs.tag }}

  package:
    needs: verify-versions
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        # The VSIX `--target` values are the same keys as the release-katari build matrix and
        # scripts/versions-common.mjs BINARY_PLATFORMS — one platform-specific VSIX per binary. The
        # VSIX is just a zip, so a Linux runner can package the darwin-arm64 target too (it only bundles
        # that platform's binary, it does not run it).
        platform: [linux-x64, darwin-arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-versions.outputs.tag }}

      - name: Resolve version
        id: version
        shell: bash
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ needs.verify-versions.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - uses: pnpm/action-setup@v4

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Download the katari-lsp binary for this platform
        shell: bash
        run: |
          mkdir -p .lsp
          TARBALL="katari-lsp-${{ steps.version.outputs.version }}-${{ matrix.platform }}.tar.gz"
          for attempt in 1 2 3 4 5; do
            if gh release download "$TAG" --dir .lsp --pattern "$TARBALL"; then
              break
            fi
            if [[ "$attempt" == "5" ]]; then
              echo "release asset $TARBALL never appeared" >&2
              exit 1
            fi
            echo "release asset not ready yet (attempt $attempt); retrying in 30s"
            sleep 30
          done
          # Place it where the extension resolves the bundled server (typescript/vscode/bin/katari-lsp).
          mkdir -p typescript/vscode/bin
          tar xzf ".lsp/$TARBALL" -C typescript/vscode/bin katari-lsp
          chmod +x typescript/vscode/bin/katari-lsp
        env:
          TAG: ${{ needs.verify-versions.outputs.tag }}
          GH_TOKEN: ${{ github.token }}

      - name: Package the platform-specific VSIX
        id: package
        shell: bash
        run: |
          VSIX="katari-vscode-${{ steps.version.outputs.version }}-${{ matrix.platform }}.vsix"
          # `vsce package` runs `vscode:prepublish` (the esbuild bundle) itself; the bundled binary in
          # bin/ is picked up because .vscodeignore does not exclude it.
          pnpm --filter katari-vscode exec vsce package \
            --no-dependencies \
            --target "${{ matrix.platform }}" \
            --out "$GITHUB_WORKSPACE/$VSIX"
          echo "vsix=$VSIX" >> "$GITHUB_OUTPUT"

      - name: Upload to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify-versions.outputs.tag }}
          files: ${{ steps.package.outputs.vsix }}
