# Package the VS Code extension and attach the .vsix to the tag's GitHub Release. (Marketplace
# publishing is out of scope for now; users install the vsix from the release page.)

name: release-vsix

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (vX.Y.Z[-prerelease])"
        required: true

permissions:
  contents: write

jobs:
  vsix:
    runs-on: ubuntu-22.04
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "release-vsix: '$TAG' is not a vX.Y.Z[-prerelease] tag" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Verify the tree matches the tag
        run: node scripts/verify-versions.mjs --tag "${{ steps.tag.outputs.tag }}"

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - uses: pnpm/action-setup@v4

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Package
        run: pnpm --filter katari-vscode run package

      - name: Rename with the version
        id: artifact
        shell: bash
        run: |
          VERSION="${TAG#v}"
          mv typescript/vscode/katari-vscode.vsix "katari-vscode-$VERSION.vsix"
          echo "vsix=katari-vscode-$VERSION.vsix" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ steps.tag.outputs.tag }}

      - name: Upload to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: ${{ steps.artifact.outputs.vsix }}
