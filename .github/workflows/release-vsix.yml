name: release-vsix

# Build the VSCode extension VSIX and attach it to the GitHub Release.
# Same tag convention as release-katari (v*). Marketplace publish is a
# separate concern (out of scope for v1).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (eg. v0.1.0)."
        required: true

permissions:
  contents: write

jobs:
  vsix:
    name: build VSIX
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve version
        id: version
        shell: bash
        run: |
          ref="${{ inputs.tag || github.ref_name }}"
          echo "tag=$ref" >> "$GITHUB_OUTPUT"
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.1.3 --activate

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Bump VSIX version
        shell: bash
        working-directory: typescript/packages/katari-vscode
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ steps.version.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Package VSIX
        working-directory: typescript/packages/katari-vscode
        run: pnpm run package

      - name: Rename artifact
        shell: bash
        working-directory: typescript/packages/katari-vscode
        run: |
          mv katari-vscode.vsix "katari-vscode-${{ steps.version.outputs.version }}.vsix"
          ls -la *.vsix

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: typescript/packages/katari-vscode/katari-vscode-${{ steps.version.outputs.version }}.vsix
          fail_on_unmatched_files: true
