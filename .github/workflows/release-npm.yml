# Publish the npm packages for a tag, after release-katari has attached the platform binaries to
# the GitHub Release: @katari-lang/{types,port,runtime,bundle}, the staged
# @katari-lang/cli-<platform> binary packages, and finally the @katari-lang/cli shim that depends
# on them. Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret.

name: release-npm

on:
  workflow_run:
    workflows: [release-katari]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (vX.Y.Z[-prerelease])"
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  verify-versions:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-22.04
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.event.workflow_run.head_branch }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "release-npm: '$TAG' is not a vX.Y.Z[-prerelease] tag" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
      - name: Verify the tree matches the tag
        run: node scripts/verify-versions.mjs --tag "${{ steps.tag.outputs.tag }}"
    outputs:
      tag: ${{ steps.tag.outputs.tag }}

  publish:
    needs: verify-versions
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-versions.outputs.tag }}

      - name: Resolve version and dist-tag
        id: version
        shell: bash
        run: |
          VERSION="${TAG#v}"
          # Stable -> latest; a pre-release publishes under its identifier (rc, beta, ...) so
          # `npm install @katari-lang/cli` never resolves to one by accident.
          if [[ "$VERSION" == *-* ]]; then
            SUFFIX="${VERSION#*-}"
            DIST_TAG="${SUFFIX%%[.0-9]*}"
            DIST_TAG="${DIST_TAG:-next}"
          else
            DIST_TAG="latest"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dist-tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ needs.verify-versions.outputs.tag }}

      # Node 24+: npm >= 11.5.1 is required for OIDC Trusted Publishing.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - uses: pnpm/action-setup@v4

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r --filter "./typescript/*" run build

      - name: Download the platform binaries from the GitHub Release
        shell: bash
        run: |
          mkdir -p .binaries
          # Match only the CLI tarballs (`katari-<version>-...`), not the LSP tarballs
          # (`katari-lsp-...`) release-vsix consumes: the version starts with a digit, so the class
          # excludes the `l` of `lsp`.
          for attempt in 1 2 3 4 5; do
            if gh release download "$TAG" --dir .binaries --pattern 'katari-[0-9]*.tar.gz'; then
              exit 0
            fi
            echo "release assets not ready yet (attempt $attempt); retrying in 30s"
            sleep 30
          done
          exit 1
        env:
          TAG: ${{ needs.verify-versions.outputs.tag }}
          GH_TOKEN: ${{ github.token }}

      - name: Stage the binary packages
        run: node scripts/stage-binary-packages.mjs --version "${{ steps.version.outputs.version }}"

      - name: Inject the shim's optionalDependencies
        run: node scripts/bump-versions.mjs --version "${{ steps.version.outputs.version }}"

      - name: Publish
        shell: bash
        run: |
          set -euo pipefail
          # Library packages first, then the platform binaries, then the shim that ties them
          # together — so a partially failed publish never leaves the shim pointing at nothing.
          for dir in typescript/types typescript/port typescript/runtime typescript/bundle; do
            (cd "$dir" && pnpm publish --access public --no-git-checks --tag "$DIST_TAG")
          done
          for dir in .staged/*/; do
            (cd "$dir" && npm publish --access public --tag "$DIST_TAG")
          done
          (cd typescript/cli && pnpm publish --access public --no-git-checks --tag "$DIST_TAG")
        env:
          DIST_TAG: ${{ steps.version.outputs.dist-tag }}
