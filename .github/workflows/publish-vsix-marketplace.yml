# Publish the Katari VS Code extension to the Visual Studio Marketplace, on the pre-release CHANNEL
# (`vsce publish --pre-release`). Manually triggered only — a Marketplace push is a deliberate act,
# not something a tag should fire automatically (release-vsix.yml already attaches the per-platform
# VSIXes to the GitHub Release on every tag; this workflow is the opt-in Marketplace step on top).
#
# Why a plain vX.Y.Z tag (no -rcN): the Marketplace has no channel for semver *prerelease suffixes* —
# `vsce publish` throws on any `x.y.z-<suffix>`. Its pre-release channel takes a plain triple and is
# selected by the `--pre-release` flag (convention: an odd minor, e.g. 0.1.x, denotes pre-release).
# So a Marketplace publish must be cut from a suffix-free tag; the guard below enforces that.
#
# One-time maintainer setup:
#   1. Create/own the Marketplace publisher whose id equals `publisher` in
#      typescript/vscode/package.json (currently "yukikurage").
#   2. Add a repository secret VSCE_PAT — an Azure DevOps Personal Access Token for that publisher
#      (Marketplace > Manage scope). Without it this workflow is inert: the publish job is skipped.

name: publish-vsix-marketplace

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (plain vX.Y.Z — the Marketplace rejects -rc/-beta suffixes)"
        required: true

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-22.04
    steps:
      - name: Require a plain vX.Y.Z tag
        id: tag
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          # A suffix (…-rc7) would make `vsce publish` throw: the Marketplace has no prerelease-suffix
          # channel. Reject it here with the same message so the fix is obvious.
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "publish-vsix-marketplace: '$TAG' is not a plain vX.Y.Z tag. The VS Marketplace rejects prerelease suffixes (e.g. -rc7); cut a suffix-free tag and publish it to the pre-release channel with --pre-release." >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Detect the VSCE_PAT secret
        id: secret
        shell: bash
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          # Secrets cannot be read in a job-level `if:`, so gate the publish job on this output.
          if [[ -z "$VSCE_PAT" ]]; then
            echo "publish-vsix-marketplace: VSCE_PAT is not set — nothing will be published (inert run)."
            echo "has_pat=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_pat=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Verify the tree matches the tag
        run: node scripts/verify-versions.mjs --tag "${{ steps.tag.outputs.tag }}"
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      has_pat: ${{ steps.secret.outputs.has_pat }}

  publish:
    needs: preflight
    # Inert without the secret: no VSCE_PAT means this job never runs, so nothing is published.
    if: needs.preflight.outputs.has_pat == 'true'
    runs-on: ubuntu-22.04
    strategy:
      # Publish one platform-specific pre-release VSIX per binary, same targets as release-vsix.yml.
      # A published extension can hold multiple `--target` builds under a single version.
      matrix:
        platform: [linux-x64, darwin-arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.tag }}

      - name: Resolve version
        id: version
        shell: bash
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ needs.preflight.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - uses: pnpm/action-setup@v4

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Download the katari-lsp binary for this platform
        shell: bash
        run: |
          mkdir -p .lsp
          TARBALL="katari-lsp-${{ steps.version.outputs.version }}-${{ matrix.platform }}.tar.gz"
          for attempt in 1 2 3 4 5; do
            if gh release download "$TAG" --dir .lsp --pattern "$TARBALL"; then
              break
            fi
            if [[ "$attempt" == "5" ]]; then
              echo "release asset $TARBALL never appeared" >&2
              exit 1
            fi
            echo "release asset not ready yet (attempt $attempt); retrying in 30s"
            sleep 30
          done
          # Place it where the extension resolves the bundled server (typescript/vscode/bin/katari-lsp);
          # .vscodeignore keeps bin/ in the VSIX, so `vsce publish` ships it.
          mkdir -p typescript/vscode/bin
          tar xzf ".lsp/$TARBALL" -C typescript/vscode/bin katari-lsp
          chmod +x typescript/vscode/bin/katari-lsp
        env:
          TAG: ${{ needs.preflight.outputs.tag }}
          GH_TOKEN: ${{ github.token }}

      - name: Publish the platform VSIX to the Marketplace pre-release channel
        shell: bash
        env:
          # `vsce` reads the PAT from VSCE_PAT (see `--pat` default).
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          # `vsce publish` runs vscode:prepublish (the esbuild bundle) and packages the bundled binary
          # itself, then uploads. --skip-duplicate keeps re-runs idempotent (a version+target already
          # on the Marketplace is a no-op instead of a failure).
          pnpm --filter katari-vscode exec vsce publish \
            --no-dependencies \
            --pre-release \
            --target "${{ matrix.platform }}" \
            --skip-duplicate
