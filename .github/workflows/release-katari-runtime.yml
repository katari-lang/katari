name: release-katari-runtime

# Build the katari-runtime Docker image (linux/amd64 + linux/arm64) and
# push to GHCR on tag push. Same tag convention as release-katari.yml.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (eg. v0.1.0). Required for manual runs."
        required: true

permissions:
  contents: read
  packages: write

jobs:
  image:
    name: build & push katari-runtime image
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve version
        id: version
        shell: bash
        run: |
          ref="${{ inputs.tag || github.ref_name }}"
          echo "tag=$ref" >> "$GITHUB_OUTPUT"
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/katari-runtime"
          {
            echo "image=${image}"
            echo "tags<<EOF"
            echo "${image}:${{ steps.version.outputs.version }}"
            echo "${image}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: typescript/packages/katari-api-server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
