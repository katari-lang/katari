# Build and push the runtime server image to GHCR for a tag. Multi-platform (amd64 + arm64);
# `:latest` moves only on stable releases so a pre-release never becomes the default pull.

name: release-katari-runtime

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (vX.Y.Z[-prerelease])"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  verify-versions:
    runs-on: ubuntu-22.04
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "release-katari-runtime: '$TAG' is not a vX.Y.Z[-prerelease] tag" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
      - name: Verify the tree matches the tag
        run: node scripts/verify-versions.mjs --tag "${{ steps.tag.outputs.tag }}"
    outputs:
      tag: ${{ steps.tag.outputs.tag }}

  image:
    needs: verify-versions
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-versions.outputs.tag }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          VERSION="${TAG#v}"
          OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/$OWNER/katari"
          TAGS="$IMAGE:$VERSION"
          if [[ "$VERSION" != *-* ]]; then
            TAGS="$TAGS,$IMAGE:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ needs.verify-versions.outputs.tag }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: typescript/runtime/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
