# Shared HLint config for every package under haskell/.

- arguments:
    - -XGHC2021
    - -XDataKinds
    - -XLambdaCase
    - -XOverloadedStrings
    - -XDuplicateRecordFields
    - -XNoFieldSelectors
    - -XRecordWildCards
    - -XOverloadedRecordDot
    - -XTypeFamilies
    - -XGADTs
    - -XQuantifiedConstraints
    - -XUndecidableInstances
    - -XDerivingStrategies
    - -XTypeData
    - -XStrictData
    - -XLiberalTypeSynonyms
    - -XImpredicativeTypes
    - -XNoPatternSynonyms

- ignore: { name: Use infix }
