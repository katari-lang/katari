# Dev compose: builds the katari runtime image (api-server + admin-web baked)
# from the local tree. Reads credentials from `.env` at repo root — copy
# `.env.example` to `.env` before first `docker compose up`.
#
# For self-host (uses the published GHCR image instead) see
# `examples/self-host/docker-compose.yml`.

services:
  runtime:
    build:
      context: .
      dockerfile: typescript/packages/katari-api-server/Dockerfile
    ports:
      - "${KATARI_PORT:-8000}:8000"
    environment:
      - PORT=8000
      - DATABASE_URL=postgresql://katari:katari@db:5432/katari_runtime
      - LOG_LEVEL=${KATARI_LOG_LEVEL:-info}
      # Auth + secret crypto. Fail loud if unset so a misconfigured deploy
      # doesn't silently accept traffic on a broken auth path.
      - KATARI_API_KEY=${KATARI_API_KEY:?set KATARI_API_KEY in .env (copy from .env.example)}
      - KATARI_SECRET_KEY=${KATARI_SECRET_KEY:?set KATARI_SECRET_KEY in .env (copy from .env.example)}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=katari
      - POSTGRES_PASSWORD=katari
      - POSTGRES_DB=postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${KATARI_DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U katari -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
