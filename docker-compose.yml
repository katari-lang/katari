# Dev compose: builds the katari runtime image (api-server + admin-web baked)
# from the local tree. Reads credentials from `.env` at repo root — copy
# `.env.example` to `.env` before first `docker compose up`.
#
# For self-host (uses the published GHCR image instead) see
# `examples/self-host/docker-compose.yml`.

services:
  runtime:
    build:
      context: .
      dockerfile: typescript/packages/katari-api-server/Dockerfile
    ports:
      - "${KATARI_PORT:-8000}:8000"
    environment:
      - PORT=8000
      - DATABASE_URL=postgresql://katari:katari@db:5432/katari_runtime
      - LOG_LEVEL=${KATARI_LOG_LEVEL:-info}
      # Auth + secret crypto. Fail loud if unset so a misconfigured deploy
      # doesn't silently accept traffic on a broken auth path.
      - KATARI_API_KEY=${KATARI_API_KEY:?set KATARI_API_KEY in .env (copy from .env.example)}
      - KATARI_SECRET_KEY=${KATARI_SECRET_KEY:?set KATARI_SECRET_KEY in .env (copy from .env.example)}
      # Blob bytes go to the s3mock container (S3-compatible) over the internal
      # network, so the dockerized runtime exercises the same S3 path as prod.
      # forcePathStyle is required for non-AWS endpoints; s3mock ignores the
      # AWS creds but the SDK still needs some present to sign.
      - KATARI_BLOB_STORE=s3
      - KATARI_S3_BUCKET=katari-blobs
      - KATARI_S3_ENDPOINT=http://s3mock:9090
      - KATARI_S3_FORCE_PATH_STYLE=true
      - KATARI_S3_REGION=us-east-1
      # s3mock is ephemeral and its `initialBuckets` is unreliable across image
      # versions, so have the runtime create the bucket on boot (idempotent).
      - KATARI_S3_CREATE_BUCKET=true
      - AWS_ACCESS_KEY_ID=s3mock
      - AWS_SECRET_ACCESS_KEY=s3mock
    depends_on:
      db:
        condition: service_healthy
      s3mock:
        condition: service_started

  db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=katari
      - POSTGRES_PASSWORD=katari
      - POSTGRES_DB=postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${KATARI_DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U katari -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # S3-compatible object store for the blob layer. adobe/s3mock is a
  # purpose-built mock (replaces the now-defunct MinIO OSS image).
  s3mock:
    image: adobe/s3mock
    environment:
      - debug=false
    ports:
      - "${KATARI_S3_PORT:-9090}:9090"

volumes:
  pgdata:
