# Dev compose: builds katari-runtime from the local tree.
# For self-host (uses the published GHCR image instead) see
# `examples/self-host/docker-compose.yml`.

services:
  runtime:
    build:
      context: .
      dockerfile: typescript/packages/katari-api-server/Dockerfile
    ports:
      - "${KATARI_PORT:-8000}:8000"
    environment:
      - PORT=8000
      - DATABASE_URL=postgresql://katari:katari@db:5432/katari_runtime
      - LOG_LEVEL=${KATARI_LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=katari
      - POSTGRES_PASSWORD=katari
      - POSTGRES_DB=postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${KATARI_DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U katari -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
