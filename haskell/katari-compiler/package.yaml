name: katari-compiler
version: 0.1.0.0
author: yukikurage
license: MIT

language: GHC2021

library:
  source-dirs: src
  exposed-modules:
    - Katari
    - Katari.AST
    - Katari.AST.Identifiers
    - Katari.Diagnostic
    - Katari.Internal
    - Katari.Lexer
    - Katari.Parser
    - Katari.Typechecker.Identifier
    - Katari.Typechecker.SemanticType
    - Katari.Typechecker.NormalizedType
    - Katari.Typechecker.ConstraintGenerator
    - Katari.Typechecker.Solver
    - Katari.Typechecker.Solver.Branch
    - Katari.Typechecker.Solver.Decompose
    - Katari.Typechecker.Solver.Effect
    - Katari.Typechecker.Solver.Internal
    - Katari.Typechecker.Solver.Substitution
    - Katari.Typechecker.Zonker
    - Katari.Typechecker.Exhaustive
    - Katari.IR
    - Katari.Lowering
    - Katari.Schema
    - Katari.Compile

tests:
  katari-compiler-test:
    main: Spec.hs
    source-dirs: test
    other-modules:
      - Katari.ParserSpec
      - Katari.IdentifierSpec
      - Katari.ConstraintGeneratorSpec
      - Katari.ZonkerSpec
      - Katari.SolverSpec
      - Katari.IRSpec
      - Katari.LoweringSpec
      - Katari.DiagnosticSpec
      - Katari.SchemaSpec
      - Katari.CompileSpec
    dependencies:
      - katari-compiler
      - hspec
      - megaparsec
      - directory
      - filepath

dependencies:
  - base >= 4.18 && < 5
  - megaparsec
  - parser-combinators
  - text
  - bytestring
  - containers
  - mtl
  - transformers
  - aeson
  - scientific
  - vector

default-extensions:
  - DataKinds
  - LambdaCase
  - OverloadedStrings
  - DuplicateRecordFields
  - NoFieldSelectors
  - RecordWildCards
  - OverloadedRecordDot
  - TypeFamilies
  - GADTs
  - QuantifiedConstraints
  - UndecidableInstances
  - DerivingStrategies
  - TypeData
