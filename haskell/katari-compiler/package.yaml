name: katari-compiler
version: 0.1.0.0
author: yukikurage
license: MIT

library:
  source-dirs: src
  exposed-modules:
    - Katari
    - Katari.Syntax
    - Katari.Lexer
    - Katari.Parser
    - Katari.Types
    - Katari.Module
    - Katari.Typechecker
    - Katari.IR
    - Katari.IRPrint
    - Katari.Lowering
    - Katari.Emit
    - Katari.Schema

dependencies:
  - base >= 4.18 && < 5
  - megaparsec >= 9.6
  - parser-combinators >= 1.3
  - text >= 2.0
  - bytestring >= 0.11
  - containers >= 0.6
  - mtl >= 2.3
  - transformers >= 0.6
  - aeson >= 2.0
  - scientific >= 0.3
  - vector >= 0.12

default-extensions:
  - GHC2021
  - OverloadedStrings
  - LambdaCase
  - TupleSections
  - RecordWildCards
  - StrictData
