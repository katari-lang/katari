name: katari-compiler
version: 0.1.0.0
author: yukikurage
license: MIT

language: GHC2021

library:
  source-dirs: src
  exposed-modules:
    - Katari
    - Katari.AST
    - Katari.Common
    - Katari.Id
    - Katari.Diagnostic
    - Katari.Diagnostic.Render
    - Katari.Internal
    - Katari.Lexer
    - Katari.Parser
    - Katari.Prim
    - Katari.Stdlib
    - Katari.Typechecker.Identifier
    - Katari.SemanticType
    - Katari.Typechecker.NormalizedType
    - Katari.Typechecker.ConstraintGenerator
    - Katari.Typechecker.Solver
    - Katari.Typechecker.Solver.Branch
    - Katari.Typechecker.Solver.Decompose
    - Katari.Typechecker.Solver.Request
    - Katari.Typechecker.Solver.Internal
    - Katari.Typechecker.Solver.Substitution
    - Katari.Typechecker.Zonker
    - Katari.Typechecker.Exhaustive
    - Katari.IR
    - Katari.Lowering
    - Katari.Schema
    - Katari.Compile
    - Katari.Query
    - Katari.SourceSpan

executables:
  katari-compiler:
    main: Main.hs
    source-dirs: app
    dependencies:
      - katari-compiler
      - katari-project
      - optparse-applicative
      - aeson
      - aeson-pretty
      - bytestring
      - text
      - containers
      - directory
      - filepath
      - mtl

tests:
  katari-compiler-test:
    main: Spec.hs
    source-dirs: test
    other-modules:
      - Katari.ParserSpec
      - Katari.IdentifierSpec
      - Katari.ConstraintGeneratorSpec
      - Katari.ZonkerSpec
      - Katari.SolverSpec
      - Katari.IRSpec
      - Katari.LoweringSpec
      - Katari.DiagnosticSpec
      - Katari.SchemaSpec
      - Katari.CompileSpec
      - Katari.GoldenSpec
      - Katari.PropertySpec
    dependencies:
      - katari-compiler
      - hspec
      - hspec-hedgehog
      - hedgehog
      - megaparsec
      - directory
      - filepath
      - aeson-pretty
      - aeson
      - bytestring
      - text
      - containers

dependencies:
  - base >= 4.18 && < 5
  - megaparsec
  - parser-combinators
  - text
  - bytestring
  - containers
  - mtl
  - transformers
  - aeson
  - prettyprinter
  - prettyprinter-ansi-terminal
  - safe

default-extensions:
  - DataKinds
  - LambdaCase
  - OverloadedStrings
  - DuplicateRecordFields
  - NoFieldSelectors
  - RecordWildCards
  - OverloadedRecordDot
  - TypeFamilies
  - GADTs
  - QuantifiedConstraints
  - UndecidableInstances
  - DerivingStrategies
  - TypeData
  - StrictData
  - LiberalTypeSynonyms
  - ImpredicativeTypes
