name: katari-compiler
version: 0.1.0.0
author: yukikurage
license: MIT

language: GHC2021

library:
  source-dirs: src
  exposed-modules:
    - Katari
    - Katari.AST
    - Katari.Lexer
    - Katari.Parser
    - Katari.Typechecker
    - Katari.Typechecker.Identifier
    - Katari.Typechecker.SemanticType
    - Katari.Typechecker.NormalizedType
    - Katari.Typechecker.ConstraintGenerator
    - Katari.Typechecker.Solver
    - Katari.Typechecker.Zonker

tests:
  katari-compiler-test:
    main: Spec.hs
    source-dirs: test
    other-modules:
      - Katari.ParserSpec
      - Katari.IdentifierSpec
      - Katari.ConstraintGeneratorSpec
    dependencies:
      - katari-compiler
      - hspec
      - megaparsec

dependencies:
  - base >= 4.18 && < 5
  - megaparsec
  - parser-combinators
  - text
  - bytestring
  - containers
  - mtl
  - transformers
  - aeson
  - scientific
  - vector

default-extensions:
  - DataKinds
  - LambdaCase
  - OverloadedStrings
  - DuplicateRecordFields
  - NoFieldSelectors
  - RecordWildCards
  - OverloadedRecordDot
  - TypeFamilies
  - GADTs
  - QuantifiedConstraints
  - UndecidableInstances
