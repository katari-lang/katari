name: katari-project
version: 0.1.0.0
author: yukikurage
license: MIT

language: GHC2021

library:
  source-dirs: src
  exposed-modules:
    - Katari.Project.Cache
    - Katari.Project.Config
    - Katari.Project.Discovery
    - Katari.Project.Fetch
    - Katari.Project.Lockfile
    - Katari.Project.ModuleName
    - Katari.Project.Resolve
    - Katari.Project.Snapshot
    - Katari.Project.Toml

tests:
  katari-project-test:
    main: Spec.hs
    source-dirs: test
    other-modules:
      - Katari.Project.ConfigSpec
      - Katari.Project.DiscoverySpec
      - Katari.Project.LockfileSpec
      - Katari.Project.ResolveSpec
      - Katari.Project.SnapshotSpec
    dependencies:
      - katari-project
      - hspec
      - directory
      - filepath
      - text
      - containers
      - temporary

dependencies:
  - base >= 4.18 && < 5
  - text
  - bytestring
  - base16-bytestring
  - containers
  - crypton
  - directory
  - filepath
  - http-client
  - http-client-tls
  - http-types
  - memory
  - mtl
  - process
  - temporary
  - tar
  - tomland
  - transformers
  - unordered-containers
  - validation-selective
  - zlib

default-extensions:
  - LambdaCase
  - OverloadedStrings
  - DuplicateRecordFields
  - NoFieldSelectors
  - OverloadedRecordDot
  - RecordWildCards
  - StrictData
  - DerivingStrategies
