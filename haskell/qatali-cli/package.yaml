spec-version: 0.36.0
name: qatali-cli
version: 0.1.0.0
synopsis: Qatali package manager and runtime connector
author: yukikurage
license: MIT

language: GHC2021

default-extensions:
  - OverloadedStrings
  - OverloadedRecordDot
  - DuplicateRecordFields
  - TypeFamilies
  - LambdaCase
  - DerivingStrategies

dependencies:
  - base >= 4.18 && < 5
  - text
  - bytestring
  - containers
  - mtl
  - transformers
  - aeson
  - yaml
  - filepath
  - directory
  - process
  - optparse-applicative
  - http-client
  - http-client-tls
  - http-types
  - prettyprinter
  - prettyprinter-ansi-terminal
  - qatali-compiler

library:
  source-dirs: src

executables:
  qatali:
    main: Main.hs
    source-dirs: app
    dependencies:
      - qatali-cli
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N

tests:
  qatali-cli-test:
    main: Spec.hs
    source-dirs: test
    dependencies:
      - qatali-cli
      - hspec
