name: katari-compiler
version: 0.1.0.0
license: MIT
author: "yukikurage"

language: GHC2021

dependencies:
  - base >= 4.7 && < 5
  - megaparsec
  - parser-combinators
  - text
  - bytestring
  - containers
  - mtl
  - transformers
  - aeson
  - prettyprinter
  - prettyprinter-ansi-terminal
  - hashable
  - safe
  - vector
  - parallel
  - async
  - stm

ghc-options:
  - -Wall
  - -Wcompat
  - -Widentities
  - -Wincomplete-record-updates
  - -Wincomplete-uni-patterns
  - -Wmissing-export-lists
  - -Wmissing-home-modules
  - -Wpartial-fields
  - -Wredundant-constraints

library:
  source-dirs: src
  exposed-modules:
    - Katari.Data.SemanticType
    - Katari.Data.Id
    - Katari.Data.QualifiedName
    - Katari.Data.Environment
    - Katari.Data.NormalizedType

tests:
  compiler-test:
    main: Spec.hs
    source-dirs: test
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - katari-compiler

default-extensions:
  - DataKinds
  - LambdaCase
  - OverloadedStrings
  - DuplicateRecordFields
  - NoFieldSelectors
  - RecordWildCards
  - OverloadedRecordDot
  - TypeFamilies
  - GADTs
  - QuantifiedConstraints
  - UndecidableInstances
  - DerivingStrategies
  - TypeData
  - StrictData
  - LiberalTypeSynonyms
  - ImpredicativeTypes
