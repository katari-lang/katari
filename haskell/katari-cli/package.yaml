name: katari-cli
version: 0.1.0.0
author: yukikurage
license: MIT

executables:
  katari:
    main: Main.hs
    source-dirs: app
    dependencies:
      - base >= 4.18 && < 5
      - katari-compiler
      - optparse-applicative >= 0.18
      - text >= 2.0
      - bytestring >= 0.11
      - containers >= 0.6
      - directory >= 1.3
      - filepath >= 1.4
      - aeson >= 2.0

default-extensions:
  - GHC2021
  - OverloadedStrings
  - LambdaCase
