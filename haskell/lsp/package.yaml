name: katari-lsp
version: 0.1.0.0
license: MIT
author: "yukikurage"

language: GHC2021

dependencies:
  - base >= 4.18 && < 5
  - katari-compiler
  - katari-project
  - lsp
  - lsp-types
  - text
  - containers
  - stm
  - directory
  - filepath
  - lens
  - vector

ghc-options:
  - -Wall
  - -Wcompat
  - -Widentities
  - -Wincomplete-record-updates
  - -Wincomplete-uni-patterns
  - -Wmissing-home-modules
  - -Wpartial-fields
  - -Wredundant-constraints

library:
  source-dirs: src
  exposed-modules:
    - Katari.LSP.Server
    - Katari.LSP.State
    - Katari.LSP.Convert
    - Katari.LSP.Handlers.Document
    - Katari.LSP.Handlers.Hover
    - Katari.LSP.Handlers.Definition
    - Katari.LSP.Handlers.References
    - Katari.LSP.Handlers.Completion

executables:
  katari-lsp:
    main: Main.hs
    source-dirs: app
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - katari-lsp

default-extensions:
  - DataKinds
  - LambdaCase
  - OverloadedStrings
  - DuplicateRecordFields
  - NoFieldSelectors
  - OverloadedRecordDot
  - RecordWildCards
  - StrictData
  - DerivingStrategies
