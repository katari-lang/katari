name: katari-compiler
version: 0.1.0.0
author: yukikurage
license: MIT

library:
  source-dirs: src
  exposed-modules:
    - Katari
    - Katari.Syntax
    - Katari.Lexer
    - Katari.Parser
    - Katari.Types
    - Katari.Module
    - Katari.Typechecker
    - Katari.IR
    - Katari.IRPrint
    - Katari.Lowering
    - Katari.Emit
    - Katari.Schema

dependencies:
  - base >= 4.18 && < 5
  - megaparsec
  - parser-combinators
  - text
  - bytestring
  - containers
  - mtl
  - transformers
  - aeson
  - scientific
  - vector

default-extensions:
  - GHC2021
  - OverloadedStrings
  - LambdaCase
  - TupleSections
  - RecordWildCards
  - StrictData
